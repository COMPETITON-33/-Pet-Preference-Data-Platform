<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>댕큐! (DangQ) - 통합 플랫폼</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans KR", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f6fbf8 0%, #ffffff 100%);
      color: #1a1a1a;
      padding: 20px;
    }

    .main-logo {
      font-size: 32px;
      font-weight: 900;
      color: #2d8653;
      margin-bottom: 40px;
    }

    .container {
      display: flex;
      gap: 24px;
      width: 100%;
      max-width: 900px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      flex: 1;
      min-width: 320px;
      max-width: 420px;
      padding: 32px 24px;
      border: 1px solid #e7ece9;
      border-radius: 20px;
      background: #fff;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
    }

    .card-title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 12px;
      color: #1a1a1a;
    }

    .card-desc {
      font-size: 15px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 24px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn {
      display: inline-block;
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 700;
      transition: background 0.2s ease;
    }

    /* B2B 스타일 (기존 초록색 유지) */
    .btn-b2b {
      background: #2d8653;
      color: #fff;
    }
    .btn-b2b:hover {
      background: #236b42;
    }

    /* B2C 스타일 (차별화를 위해 약간 다른 톤 혹은 같은 톤 유지 가능) */
    .btn-b2c {
      background: #4a90e2;
      color: #fff;
    }
    .btn-b2c:hover {
      background: #357abd;
    }

    .footer-note {
      margin-top: 40px;
      font-size: 13px;
      color: #999;
    }
  </style>
</head>
